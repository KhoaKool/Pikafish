name: 🏗️ Pikafish Dell 7559 | AVX2 ✅ BMI2 ❌
run-name: Build #${{ github.run_number }} | NPS + SOLO vs GỐC

on:
  push:
    branches: [ main ]
    paths: [ "**.patch", ".github/workflows/**" ]
  workflow_dispatch:
  release:
    types: [ published ]

env:
  REPO: official-pikafish/Pikafish
  BRANCH: master
  ARCH: x86-64-avx2
  # KHÓA CỨNG 100% CHO i7‑6700HQ SKYLAKE
  CFLAGS: "-march=skylake -mtune=skylake -mavx2 -mfma -mbmi -ffp-contract=fast -fno-rtti -fno-exceptions"
  # Thời gian đấu: 5 giây + 50ms mỗi nước = đủ sâu, chạy nhanh trong giới hạn Actions
  TC: "5+0.05"
  ROUNDS: 200          # Tổng 400 ván đảo màu
  CONCURRENCY: 4        # Khớp với luồng Dell 7559
  HASH: 512
  THREADS: 4

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1: BUILD + ĐO TỐC ĐỘ TRÊN ĐÁM MÂY
  # ──────────────────────────────────────────────────────────────
  build-cloud:
    name: ☁️ Build + Bench
    runs-on: windows-latest
    outputs:
      nps_avx2: ${{ steps.bench_avx2.outputs.NPS }}
      nps_bmi2: ${{ steps.bench_bmi2.outputs.NPS }}
    defaults:
      run: { shell: msys2 {0} }
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          update: true
          install: git make mingw-w64-x86_64-gcc mingw-w64-x86_64-binutils
      - name: 🧬 Clone Pikafish chính thức
        run: git clone --depth 1 -b $BRANCH https://github.com/$REPO.git pika
      - name: 🩹 Áp dụng vá AN TOÀN + vá DELL 7559
        run: |
          cd pika
          git apply --ignore-whitespace -v ../01-pikafish-final-safe-all-in-one.patch
          git apply --ignore-whitespace -v ../02-pikafish-dell-7559-only.patch
          sed -i 's/-mbmi2//g; s/-mavx512[^ ]*//g' src/Makefile
      - name: ⚡ PROFILE BUILD ⭐ Bản vá
        run: |
          cd pika/src && make clean
          make -j4 profile-build ARCH=$ARCH EXTRACXXFLAGS="$CFLAGS" COMP=gcc 2>&1 | tail -10
          cp pikafish.exe ../../pikafish-PATCHED.exe
      - name: ⏱️ Bench bản vá
        id: bench_avx2
        run: |
          OUT=$(./pikafish-PATCHED.exe bench 16 4 24 default depth 2>&1 | tail -3)
          echo "$OUT"
          echo "NPS=$(echo "$OUT" | grep -oP 'Nodes/second\s+\K[0-9]+')" >> $GITHUB_OUTPUT
      - name: ⚠️ Build BMI2 CHỈ ĐỂ CHỨNG MINH NÓ CHẬM HƠN
        id: bench_bmi2
        continue-on-error: true
        run: |
          cd pika/src && make clean
          make -j4 build ARCH=x86-64-bmi2 COMP=gcc 2>&1 | tail -3
          OUT=$(./pikafish bench 16 4 24 default depth 2>&1 | tail -2)
          echo "$OUT"
          echo "NPS=$(echo "$OUT" | grep -oP 'Nodes/second\s+\K[0-9]+')" >> $GITHUB_OUTPUT
      - name: 🧬 Build BẢN GỐC KHÔNG VÁ để đấu đối kháng
        run: |
          git clone --depth 1 -b $BRANCH https://github.com/$REPO.git pika-orig
          cd pika-orig/src && make clean
          make -j4 build ARCH=$ARCH EXTRACXXFLAGS="$CFLAGS" COMP=gcc 2>&1 | tail -5
          cp pikafish.exe ../../pikafish-ORIGINAL.exe
      - name: 📦 Lưu 2 file exe cho job đấu
        uses: actions/upload-artifact@v4
        with:
          name: engines-bin
          path: |
            pikafish-PATCHED.exe
            pikafish-ORIGINAL.exe
            pikafish-uci-dell7559.ini
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # JOB 2: TỰ ĐỘNG ĐẤU SOLO ⚔️ BẢN VÁ vs BẢN GỐC
  # ──────────────────────────────────────────────────────────────
  solo-match:
    name: ⚔️ SOLO: PATCHED vs ORIGINAL
    needs: build-cloud
    runs-on: windows-latest
    defaults:
      run: { shell: pwsh }
    steps:
      - uses: actions/checkout@v4
      - name: 📥 Tải 2 engine đã biên dịch
        uses: actions/download-artifact@v4
        with: { name: engines-bin }
      - name: ⬇️ Tải fast‑chess + sách khai cuộc
        run: |
          Invoke-WebRequest -Uri "https://github.com/Matthies/fastchess/releases/latest/download/fastchess-win-x64.zip" -OutFile fc.zip
          Expand-Archive fc.zip -DestinationPath .
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/official-pikafish/books/master/xqbook3moves.bin" -OutFile opening.bin
      - name: ⚔️ Bắt đầu đấu tự động | SPRT(0,±5) α=β=5%
        run: |
          .\fastchess.exe `
            -engine name="✅ PATCHED‑AVX2" cmd=".\pikafish-PATCHED.exe" option.Hash=${{ env.HASH }} option.Threads=${{ env.THREADS }} `
            -engine name="⬜ ORIGINAL"     cmd=".\pikafish-ORIGINAL.exe" option.Hash=${{ env.HASH }} option.Threads=${{ env.THREADS }} `
            -each tc=${{ env.TC }} proto=uci variant=xiangqi `
            -openings file=opening.bin format=bin order=random plies=6 `
            -rounds ${{ env.ROUNDS }} -repeat -concurrency ${{ env.CONCURRENCY }} `
            -sprt elo0=0 elo1=5 alpha=0.05 beta=0.05 `
            -resign movecount=3 score=500 `
            -draw movenumber=40 movecount=6 score=10 `
            -pgnout matches.pgn `
            -log log.txt
      - name: 📊 TRÍCH XUẤT KẾT QUẢ CUỐI CÙNG
        id: result
        run: |
          $r = Get-Content log.txt -Tail 40 | Select-String "PATCHED|ELO|WIN|DRAW|LOSS|SPRT"
          $r | ForEach-Object { Write-Host $_.Line }
          "RESULT<<EOF" >> $env:GITHUB_OUTPUT
          $r | ForEach-Object { $_.Line + "`n" } >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT
      - name: 📦 Lưu toàn bộ ván đấu + log
        uses: actions/upload-artifact@v4
        with:
          name: solo-results
          path: |
            matches.pgn
            log.txt
          retention-days: 90

